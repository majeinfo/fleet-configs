apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: sysctl-config
  namespace: kube-system
spec:
  selector:
    matchLabels:
      app: sysctl-config
  template:
    metadata:
      labels:
        app: sysctl-config
    spec:
      # sans tolerations, Pods uniquement sur workers
      hostPID: true
      containers:
      - name: sysctl
        image: busybox
        securityContext:
          privileged: true
          sysctls:
            - name: net.core.somaxconn
              value: "65535"
        command:
          - sh
          - -c
          - sleep 3600
